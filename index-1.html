<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secrets Maths — Prépa BEPC 2026 | Prof. M. TONI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--or:#c9a84c;--fond:#0d1117;--fond2:#161b22;--texte:#e6edf3;--gris:#8b949e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--fond);color:var(--texte);line-height:1.5;overflow-x:hidden}

/* Correction de l'affichage initial */
#main-page { display: block !important; width: 100%; min-height: 100vh; }

.hero{padding:50px 20px;text-align:center;background:linear-gradient(180deg,#1a2340 0%,#0d1117 100%)}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:45px;color:var(--or);margin-bottom:10px}
.hero p{font-size:14px;color:var(--gris);text-transform:uppercase;letter-spacing:2px}

.pricing{margin:20px;background:var(--fond2);border:1px solid var(--or);border-radius:15px;padding:30px;text-align:center}
.amount{font-size:50px;font-weight:700;color:var(--or);display:block}

.btn-commander{width:100%;background:var(--or);color:#000;padding:15px;border:none;border-radius:10px;font-weight:600;font-size:16px;margin-top:20px;cursor:pointer}

.access-box{margin:20px;padding:20px;background:#1c2333;border-radius:10px;text-align:center}
.code-input{width:100%;padding:12px;margin:10px 0;background:#0d1117;border:1px solid #30363d;color:#fff;text-align:center;text-transform:uppercase}

/* Overlays */
#viewer-overlay, #commande-overlay {
    display:none; position:fixed; inset:0; background:var(--fond); z-index:1000;
}
.active { display: flex !important; flex-direction: column; }
iframe { width: 100%; height: 100%; border: none; }
.close-btn { padding: 10px; background: red; color: white; text-align: center; cursor: pointer; }
</style>
</head>
<body>

<div id="main-page">
    <section class="hero">
        <p>Édition 2026</p>
        <h1>Secrets Maths</h1>
        <p>Par Prof. M. TONI — CEG de Kou</p>
    </section>

    <div class="pricing">
        <p>Accès Complet (PDF 224 pages)</p>
        <span class="amount">2 500 FCFA</span>
        <button class="btn-commander" onclick="ouvrirCommande()">💳 Commander via WhatsApp</button>
    </div>

    <div class="access-box">
        <p>Déjà un code ?</p>
        <input type="text" id="codeInput" class="code-input" placeholder="ENTREZ VOTRE CODE">
        <button class="btn-commander" style="background:#3fb950" onclick="verifierCode()">Accéder au livre</button>
        <div id="msg"></div>
    </div>
</div>

<div id="commande-overlay">
    <div style="padding:40px; text-align:center">
        <h2 style="color:var(--or)">Passer commande</h2>
        <p>Payez 2 500 F au 54 36 81 80</p>
        <button class="btn-commander" onclick="envoyerWhatsApp()">Envoyer le reçu sur WhatsApp</button>
        <button class="btn-commander" style="background:grey" onclick="fermerCommande()">Retour</button>
    </div>
</div>

<div id="viewer-overlay">
    <div class="close-btn" onclick="fermerViewer()">FERMER LA LECTURE</div>
    <iframe id="pdfFrame" src=""></iframe>
</div>

<script>
const PDF_URL = "https://drive.google.com/file/d/1bQQ6b7S0JqpHmXMoIZ_B5rNECqTakZTi/preview";

function ouvrirCommande() { document.getElementById('commande-overlay').classList.add('active'); }
function fermerCommande() { document.getElementById('commande-overlay').classList.remove('active'); }

function envoyerWhatsApp() {
    const txt = encodeURIComponent("Bonjour Prof. TONI, je souhaite acheter le livre Secrets Maths 2026.");
    window.open("https://wa.me/22654368180?text=" + txt, "_blank");
}

function verifierCode() {
    const input = document.getElementById('codeInput').value.trim();
    const codesString = localStorage.getItem('sm_codes') || "[]";
    const codes = JSON.parse(codesString);
    
    // Pour vos tests, vous pouvez ajouter manuellement un code "TEST2026"
    if(input === "TEST2026") {
        ouvrirViewer();
    } else {
        document.getElementById('msg').innerHTML = "<span style='color:red'>Code invalide</span>";
    }
}

function ouvrirViewer() {
    document.getElementById('pdfFrame').src = PDF_URL;
    document.getElementById('viewer-overlay').classList.add('active');
}

function fermerViewer() {
    document.getElementById('viewer-overlay').classList.remove('active');
    document.getElementById('pdfFrame').src = "";
}
</script>

</body>
</html>
